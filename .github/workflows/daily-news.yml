name: Daily portfolio news

on:
  schedule:
    # 22:00 UTC = 05:00 Asia/Bangkok the next day, Sun-Thu → Mon-Fri morning.
    # Scheduled early to absorb GitHub Actions cron drift (free-tier delays
    # are commonly 30 min, occasionally a few hours). Even with a worst-case
    # 3h delay, the news still lands by ~08:00 BKK.
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Sanity-check secrets
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          set -eu
          : "${WORKER_URL:?repo variable WORKER_URL missing (e.g. https://buddyai.sakpongun.workers.dev)}"
          : "${CRON_KEY:?repo secret CRON_KEY missing — same value as the wrangler secret}"
          echo "ready"

      - name: Trigger /test-news on the worker
        env:
          WORKER_URL: ${{ vars.WORKER_URL }}
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_KEY" \
            "${WORKER_URL%/}/test-news")
          echo "HTTP $code"
          cat /tmp/body
          echo
          [ "$code" = "200" ]
