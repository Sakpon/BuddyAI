name: D1 Migrate

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Migration file under migrations/ (e.g. 0002_add_alert_subscribed.sql). Leave blank to apply all.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - name: Apply specified migration
        if: ${{ inputs.file != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute finance-db --remote --file=migrations/${{ inputs.file }}

      - name: Apply all migrations (in order)
        if: ${{ inputs.file == '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          for f in $(ls migrations/*.sql | sort); do
            echo "Applying $f"
            npx wrangler d1 execute finance-db --remote --file="$f"
          done
