name: Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check all source files
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            node --check "$f" || fail=1
          done < <(find src tests -type f -name '*.js' 2>/dev/null)
          exit $fail

      - name: Parse wrangler.toml
        run: |
          node -e "
            const fs = require('fs');
            const toml = fs.readFileSync('wrangler.toml', 'utf8');
            const required = ['name =', 'main =', 'compatibility_date =', 'kv_namespaces', 'd1_databases'];
            for (const k of required) {
              if (!toml.includes(k)) { console.error('missing in wrangler.toml:', k); process.exit(1); }
            }
            console.log('wrangler.toml looks ok');
          "

      - name: Sanity-check migrations exist
        run: |
          set -e
          test -f migrations/0001_init.sql
          test -f migrations/0002_add_alert_subscribed.sql
          echo "migrations present"
