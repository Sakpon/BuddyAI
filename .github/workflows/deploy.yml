name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Apply D1 migrations (with tracking)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail

          # Track which migrations have been applied so destructive ones
          # (e.g. 0004_align_legacy_schema) don't run twice and wipe data.
          npx wrangler d1 execute finance-db --remote --command \
            "CREATE TABLE IF NOT EXISTS _migrations (filename TEXT PRIMARY KEY, applied_at INTEGER NOT NULL DEFAULT (unixepoch()))" \
            > /dev/null 2>&1 || true

          applied=$(npx wrangler d1 execute finance-db --remote --json --command \
            "SELECT filename FROM _migrations" 2>/dev/null \
            | jq -r '.[0].results[]?.filename' 2>/dev/null \
            | sort -u || true)
          echo "Already-applied migrations:"
          echo "${applied:-(none)}"
          echo

          fail=0
          for f in $(ls migrations/*.sql | sort); do
            base=$(basename "$f")
            if echo "$applied" | grep -qFx "$base"; then
              echo "skip: $base (already applied)"
              continue
            fi

            echo "::group::Applying $f"
            out=$(npx wrangler d1 execute finance-db --remote --file="$f" 2>&1) || true
            echo "$out"

            # Tolerate "already-applied" errors so first-run on a DB that
            # already has the schema (e.g. inherited from finance-line-bot)
            # still records the migration and does not fail the deploy.
            tolerated=0
            if echo "$out" | grep -qiE 'duplicate column|already exists|column .* in users|cannot add a column'; then
              echo "tolerated: schema already up-to-date for this file"
              tolerated=1
            fi

            if [ "$tolerated" = "0" ] && echo "$out" | grep -qiE '✘ \[ERROR\]|^Error|D1_ERROR'; then
              echo "::error file=$f::Migration failed"
              fail=1
              echo "::endgroup::"
              continue
            fi

            # Record success (even for tolerated) so this file does not run again.
            npx wrangler d1 execute finance-db --remote --command \
              "INSERT OR IGNORE INTO _migrations (filename) VALUES ('$base')" \
              > /dev/null 2>&1 || true
            echo "recorded: $base"
            echo "::endgroup::"
          done
          exit $fail
