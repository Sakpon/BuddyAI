name = "buddyai"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/ab8f5e9234923dd340ce125286e91cf5/buddyai/anthropic"
STOCK_API = "https://stock-dashboard-api.sakpongun.workers.dev"
LIFF_STOCK_URL = "https://liff.line.me/2009626001-bwszQjZ9"
LIFF_OIL_URL = "https://liff.line.me/2009626001-1LlvAOZp"
CLAUDE_MODEL = "claude-haiku-4-5-20251001"
TIMEZONE = "Asia/Bangkok"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "bdb57e8a8f2648df9176595f4e1429b7"

[[d1_databases]]
binding = "DB"
database_name = "finance-db"
database_id = "160ca3ab-dd42-40a6-a43b-eb20bc90118e"

# Daily alert is scheduled from .github/workflows/daily-alert.yml — it
# curls /test-alert with the CRON_KEY secret. Avoids the CF cron-trigger
# account quota and keeps the schedule next to the code.

# Secrets (set via `wrangler secret put`):
#   LINE_CHANNEL_SECRET
#   LINE_CHANNEL_ACCESS_TOKEN
#   ANTHROPIC_API_KEY
#   CRON_KEY                  # any random string; same value goes in
#                             # GitHub repo secret CRON_KEY
