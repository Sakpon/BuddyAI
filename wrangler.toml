name = "buddyai"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
AI_GATEWAY_URL = "REPLACE_WITH_YOUR_AI_GATEWAY_URL"
STOCK_API = "https://stock-dashboard-api.sakpongun.workers.dev"
LIFF_STOCK_URL = "https://liff.line.me/2009626001-bwszQjZ9"
LIFF_OIL_URL = "https://liff.line.me/2009626001-1LlvAOZp"
CLAUDE_MODEL = "claude-haiku-4-5-20251001"
TIMEZONE = "Asia/Bangkok"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "finance-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[triggers]
crons = ["0 2 * * 1-5"]

# Secrets (set via `wrangler secret put`):
#   LINE_CHANNEL_SECRET
#   LINE_CHANNEL_ACCESS_TOKEN
#   ANTHROPIC_API_KEY
